<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        form {
            width: 400px;
        }

        .ctrl {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .row {
            margin-bottom: 4px;
            display: flex;
            gap: 5px;

            input {
                flex: 1;
            }

            select {
                flex: 1;
            }
        }

        .unit {
            margin-bottom: 10px;
            display: flex;
            /* align-items: center; */

            .left {
                flex: 1;
            }

            .btn-del {
                width: 50px;
            }
        }
    </style>
    <title>動態欄位的範例</title>
</head>

<body>
    <h1>訂餐系統</h1>
    <form action="">
        <div class="unit">
            <div class="left">
                <div class="row">
                    <label for="userName">姓名</label>
                    <input type="text" name="userName[]" id="userName">
                </div>
                <div class="row">
                    <label for="dinner">餐點</label>
                    <select name="dinner[]" id="dinner">
                        <option value="A">A套餐</option>
                        <option value="B">B套餐</option>
                        <option value="C">C套餐</option>
                    </select>
                </div>
            </div>

            <!-- <button type="button" class="btn-del">X</button> -->
        </div>
        <div class="add">

        </div>

        <div class="ctrl">
            <button type="button">加一組</button>
            <button type="submit">送出</button>
        </div>

    </form>

    <script>
        // 刪除等講完迴圈和事件代理再回來補

        let add = document.querySelector(".add");
        // let btn_add = document.querySelectorAll("button")[0];
        let btn_add = document.querySelector(".ctrl button");
        const form1 = document.querySelector("form");

        // 事件代理
        form1.addEventListener("click", function (event) {
            if (event.target.className != "btn-del") return;
            console.log("點到了");
            event.target.parentNode.remove();
        });

        // const btn_dels = document.querySelectorAll(".btn-del");
        // for (let i = 0; i < btn_dels.length; i++) {
        //     btn_dels[i].addEventListener("click", delOne);
        // }

        btn_add.onclick = function () {
            let node = document.createElement("div");
            // node.className = "unit";
            node.classList.add("unit");
            node.innerHTML = `<div class="left">
                                    <div class="row">
                                        <label for="userName">姓名</label>
                                        <input type="text" name="userName[]" id="userName">
                                    </div>
                                    <div class="row">
                                        <label for="dinner">餐點</label>
                                        <select name="dinner[]" id="dinner">
                                            <option value="A">A套餐</option>
                                            <option value="B">B套餐</option>
                                            <option value="C">C套餐</option>
                                        </select>
                                    </div>
                                </div>

                                <button type="button" class="btn-del">X</button>`

            add.append(node);
            // 傳統做法, 加新元素就緊接著註冊事件
            // node.querySelector(".btn-del").addEventListener("click", delOne);
        }

        // function delOne() {
        //     this.parentNode.remove()
        // }
    </script>
</body>

</html>
