<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字串屬性和方法</title>
</head>

<body>

    <script>
        const word1 = "字串屬性和方法";
        console.log(word1.length);
        console.log(word1.charAt(2)); // 傳統取字元方法
        console.log(word1[2]); // 當成陣列取
        console.log(word1.at(-2)); // 陣列的最新取索引方法

        // .slice()
        //              0 1 23 4 5 678 9 10 
        let pokemons = "新葉喵 呆火鱷 潤水鴨";
        console.log(pokemons.slice()); // 複製字串
        console.log(pokemons.slice(4)); // 沒有結束的位置就是取到最後一個字
        console.log(pokemons.slice(4, 7)); // 大於等於起始值小於結束值
        console.log(pokemons.slice(4, -1)); // -1 倒數第一個字
        console.log(pokemons.slice(-3));
        console.log(pokemons.slice(-3, -1));
        console.log(pokemons.slice(-1, -3)); // 取不到, 回傳空字串




    </script>
</body>

</html>
