<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .code-num1 {
            text-transform: uppercase;
        }

        .code-num2 {
            text-transform: lowercase;
        }
    </style>
    <title>字串屬性和方法</title>
</head>

<body>
    <input type="text" class="code-num1">
    <input type="text" class="code-num2">

    <script>
        const word1 = "字串屬性和方法";
        console.log(word1.length);
        console.log(word1.charAt(2)); // 傳統取字元方法
        console.log(word1[2]); // 當成陣列取
        console.log(word1.at(-2)); // 陣列的最新取索引方法

        // .slice()
        //              0 1 23 4 5 678 9 10 
        let pokemons = "新葉喵 呆火鱷 潤水鴨";
        console.log(pokemons.slice()); // 複製字串
        console.log(pokemons.slice(4)); // 沒有結束的位置就是取到最後一個字
        console.log(pokemons.slice(4, 7)); // 大於等於起始值小於結束值
        console.log(pokemons.slice(4, -1)); // -1 倒數第一個字
        console.log(pokemons.slice(-3));
        console.log(pokemons.slice(-3, -1));
        console.log(pokemons.slice(-1, -3)); // 取不到, 回傳空字串


        // .replace() / .replaceAll()
        let sentence = "今天是陰天，我最喜歡陰天了，我常常在陰天出去玩";
        console.log(sentence.replace("陰天", "晴天"));
        console.log(sentence.replaceAll("陰天", "晴天"));
        console.log(sentence.replace(/陰天/g, "晴天"));

        // 英文轉大小寫
        console.log("Hello JavaScript!".toUpperCase());
        console.log("Hello JavaScript!".toLowerCase());


        // 去空白
        let sentence2 = "       白日依山盡，黃河入海流      ";
        console.log(sentence2);
        console.log(sentence2.trim());
        console.log(sentence2.trimStart());
        console.log(sentence2.trimEnd());


        // 補零語法, 回傳結果是字串
        const num = 125;
        console.log(num.toString().padStart(5, "0"));
        console.log(num.toString().padEnd(5, "0"));







    </script>
</body>

</html>
