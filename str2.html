<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字串屬性和方法</title>
</head>

<body>

    <script>
        const word1 = "字串屬性和方法";
        console.log(word1.length);
        console.log(word1.charAt(2)); // 傳統取字元方法
        console.log(word1[2]); // 當成陣列取
        console.log(word1.at(-2)); // 陣列的最新取索引方法





    </script>
</body>

</html>
